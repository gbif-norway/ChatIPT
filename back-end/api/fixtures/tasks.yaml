- model: api.task
  fields:
    name: Manuscript extraction and dataset scoping
    text: |-
      MANUSCRIPT_TASK: This task is required for datasets that include one or more manuscript PDFs.

      Your goals:
      1. Review the manuscript extraction context and summarize what metadata and candidate tables were extracted.
      2. If multiple candidate datasets/tables were detected, ask the user whether to proceed with one candidate dataset or combine selected candidates.
      3. Keep one publication dataset scope at a time.
      4. If no raw biodiversity table data was extracted, explain clearly what missing source data is required and ask the user to upload additional data/PDF evidence.
      5. Save any key decisions and missing-data notes using SetStructureNotes.

      Rules:
      - Do not fabricate biodiversity records for pdf-only uploads.
      - Prefer grounded extracted tables and user-confirmed scope.
      - If metadata appears trustworthy, set/update EML fields (including manuscript DOI/citation fields) with SetEML.
      - If this scoping step is complete and no blocking clarification is needed, call SetAgentTaskToComplete.

- model: api.task
  fields:
    name: Data structure exploration
    text: |-
      Thoroughly and systematically examine the structure of each uploaded table/file using the following steps. IMPORTANT: Because there is so much variation in the way users store biodiversity data, it is VITAL to do this MANUALLY as a first pass, running your eye over the data. Iterate and use chain of thought to do as much manual assessment as possible. Write code to do more data exploration if needed. 
      Write a report on the structure covering the following steps:
        1.  **Data Islands:** Detect distinct, contiguous blocks of data. Pay close attention to empty rows or columns that might separate these islands. Describe the location (e.g., cell ranges) and general appearance of each island. 
        2.  **Structure & Formatting:** For each identified data island, describe its formatting.
            *   Is it a simple table, a crosstab (matrix)? If a crosstab, identify potential row/column headers and data cells.
            *   Are there multiple header rows? How might they be interpreted?
            *   Are there blank cells that look like they should be filled from subheader cells above or to the left?
            *   Note any other structural peculiarities.
        3.  **Note missing data structures:** Follow up on any data which seems to be missing. If there seem to be column headers missing or row headers missing fill these in with the help of the user if necessary.
        4.  **Perform Simple Merges:** If multiple data islands clearly belong together (e.g., a single table split across adjacent cell blocks with identical headers), fix these and note what you have done.
        5.  **Any other notes:** Note anything additional of interest. IMPORTANT - if it looks like there is missing data (e.g. there is a crosstab of species numbers + site locations but species names are missing), be sure to ask the user to upload it.
      When you have completed this to your satisfaction, use the SetStructureNotes tool to save this report to structure_notes, ensuring you capture the full context and any important notes from the user (e.g. if there is missing data). 
      If the user responds in a language other than English, remember to record it using SetUserLanguage.

- model: api.task
  fields:
    name: Data content exploration
    text: |-
      1. Briefly describe the type of data each data island or extracted table (see structure_notes) appears to contain (e.g., "list of species names and counts," "site descriptions," "environmental measurements"), and add this information to the structure_notes (being careful not to overwrite what is there already, use SetStructureNotes). Ask the user about anything which is completely cryptic. Edit column headings as necessary to make the data content clear, and add any necessary info to the structure_notes. 
      2. Generate a concise draft Title (3-5 words) and a short Description (1-5 sentences) for the entire dataset, describing the data itself in general, and save them using SetBasicMetadata.
         - This is mandatory for this task. Do not complete this task without setting title and description.
         - Do not ask the user to provide title/description first. Infer best-effort values from tables, extracted manuscript context, and conversation history.
         - Ask the user only for optional edits/refinements after you have saved a draft.
         - If your first SetBasicMetadata call fails due to missing title/description, immediately retry with generated draft values in the same turn.
      3. Once you have this, please generate additional required metadata described in the SetEML function, as far as it's possible to generate it. You should be the one generating it based on the data but you can check it with the user, and in fact you should ask the user about any metadata you aren't sure of, but allow them to skip this step if they wish. Derive EML fields from the data first wherever possible: temporal_scope from eventDate and/or year/month/day (earliest-latest record dates, not "today" placeholders), geographic_scope from country/state/locality and coordinate bounds, taxonomic_scope from scientificName/taxonomic columns, and methodology from samplingProtocol/method columns. Use the user's name and email address as the contact as per their profile (ask them directly if unsure, even if it means repeating their email). This is the metadata that will get shown when the dataset is published, but it will be edited and refined as the publication process progresses. DO NOT set suitable_for_publication_on_gbif to be False, this is a check we do later with more context.

- model: api.task
  fields:
    name: Data suitability assessment
    text: |-
      GBIF.org is a global database for biodiversity data. Suitable data for publication:
      1. Species Occurrence Data: WHAT (species/family/order level identification or higher level) / WHEN (columns for year/month/day or date) / WHERE (locality and/or latitude/longitude and/or footprintwkt). Optionally also WHO made the observation. May also be e.g. eDNA data even if the species identification only occurs at a higher taxonomic level.
      2. Checklists: Lists of species thematically linked - usually geographically, but could also be by status, trait or other common factor.All that's required is a scientific name.

      *   Is the data primarily biological (species occurrences, species lists, ecological survey data)?
      *   If the data appears to be non-biological (e.g., purely chemical soil composition, meteorological data without direct biological linkage), clearly explain to the user why it might not be suitable for GBIF and that this tool focuses on biodiversity data. IMPORTANT! Give the user a chance to respond until you both agree the dataset is not suitable for publication GBIF, only then should you set the suitable_for_publication_on_gbif flag to False using SetBasicMetadata, if it's clearly unsuitable.
      *   Prompt the user to upload a new file with additional data if necessary. They have access to a paper clip button in the chat interface to do this.
      *   Leave all data transformation and cleaning to the next agent.
      *   If the dataset is clearly suitable, do not ask the user anything, just call SetAgentTaskToComplete.

- model: api.task
  fields:
    name: Data transformation
    text: |-
      Transform the explored and structured data into the Darwin Core (DwC) standard. Aim for one core DwC table (either Occurrence or Checklist/Taxonomy) and, if necessary, one or two optional extension tables (e.g. measurementOrFact, dnaDerivedData, etc). Ensure any extension table records link back to the core table using occurrenceID or taxonID, and discard all derived/summary data so only primary data is published.

      Use Table.title to name tables according to what they are (e.g. "occurrence", "measurement_or_fact", "dna_derived_data", etc).

      LOOKUP-FIRST RULE (critical):
      - Do not rely on memory for Darwin Core details.
      - Before finalizing a core table, call GetDarwinCoreInfo with section='Record-level' and section matching your core choice (Occurrence/Event/Taxon).
      - Before adding any extension field, call GetDwCExtensionInfo with that extension key/filename.
      - If you are unsure between similar terms, call GetDarwinCoreInfo with terms=[...] and compare definitions.

      Publication-critical terms (usually expected for most occurrence datasets):
      - occurrenceID: unique record identifier (create UUIDs if absent).
      - basisOfRecord: controlled values only (MaterialEntity, PreservedSpecimen, FossilSpecimen, LivingSpecimen, MaterialSample, Event, HumanObservation, MachineObservation, Taxon, Occurrence, MaterialCitation). For eDNA-like records prefer MaterialSample and use DNA Derived Data extension where appropriate.
      - scientificName: best available taxonomic name.
      - eventDate (or year/month/day): ISO-compatible date information where available.
      - location representation: locality OR decimalLatitude+decimalLongitude (and geodeticDatum when coordinates are present).
      - quantity representation when available: occurrenceStatus OR individualCount OR organismQuantity+organismQuantityType.

      Context-dependent high-risk mappings (easy to misuse):
      - recordedBy vs recordedByID (IDs are identifiers such as ORCID, not names).
      - individualCount vs organismQuantity/organismQuantityType (do not use organismQuantity without a clear type).
      - MeasurementOrFact should hold true measurement/assertion records; do not move core location/date/abundance fields there just because they are hard to map.
      - for non-phylogenetic data, dynamicProperties is last structured fallback only after checking relevant core and extension terms.
      - extension linking IDs must reference valid core IDs (occurrenceID/eventID/taxonID).

      **Your Process:**
      1. Write a concise transformation plan with your proposed DwC core and likely extensions.
      2. Perform the required GetDarwinCoreInfo/GetDwCExtensionInfo lookups before mapping terms.
      3. Execute transformation in Python in small, testable chunks. Remember to:
          *   Rename columns to DwC terms.
          *   Create new DwC columns, populating them with existing data, default values (e.g., for basisOfRecord if clear), or by transforming existing data.
          *   Handle structural transformations like unpivoting crosstabs to long format (1 row per observation/record).
          *   Join tables if necessary (e.g., merging a locality lookup table into the main data). Double-check join correctness.
          *   Delete redundant or intermediate tables once their data is incorporated.
      4. If key publication-critical values are missing and cannot be inferred safely, leave them blank, ask the user only when necessary, and record the gap in SetStructureNotes (do not invent values).
      5. If your understanding of the dataset changes significantly, update SetBasicMetadata and SetStructureNotes.

- model: api.task
  fields:
    name: Data validation and refinement
    text: |-
      Systematically check the Darwin Core-transformed data for errors, inconsistencies, and adherence to standards, then correct these issues. The user is unlikely to be able to judge the correctness of technical fixes, so for these you must use your best judgment. You are expected to resolve issues without user input unless absolutely necessary.

      LOOKUP-FIRST RULE (critical):
      - For each core/extension table, call GetDarwinCoreInfo and/or GetDwCExtensionInfo before deciding a term is wrong.
      - Do not "fix" terms based on memory alone.

      Validation loop:
      1. Manual assessment: inspect snapshots for semantic issues and suspicious mappings.
      2. Run standard checks with BasicValidationForSomeDwCTerms.
      3. Add targeted Python checks where needed.
      4. Plan corrections in small chunks, execute, then re-validate.
      5. Repeat until stable or until no safe automatic improvement remains.

      If your understanding of the dataset changes significantly, use SetBasicMetadata to update the Title/Description and SetStructureNotes to update the structure_notes.

      Validation priorities:
      - Publication-critical terms: ensure presence/population where possible for the chosen core. If unavailable, leave blank and note clearly; do not fabricate.
      - Formats and numeric bounds: eventDate (ISO-compatible), lat/long ranges, individualCount integer positivity, numeric coercion sanity.
      - Controlled values: basisOfRecord, occurrenceStatus, and any controlled fields actually used.
      - Link integrity: extension linking IDs must resolve to valid core IDs.
      - Consistency and hygiene: scientificName/locality normalization, whitespace/case cleanup, mixed-type cleanup, duplicate ID handling.

      Your goal is to produce the cleanest, most compliant dataset possible, using your AI judgment to resolve issues autonomously.

- model: api.task
  fields:
    name: Phylogenetic tree linking
    text: |-
      TREE_LINKING_TASK: This task links phylogenetic tree tips to Darwin Core records.
      
      You have been provided with tree file information above, including:
      - A preview of the tree file content (first 500 characters)
      - A list of parsed tip labels from the tree
      
      Your job is to carefully inspect the format of the tree tip labels and figure out how to match them to records in your occurrence or taxon table. Tree tip labels come in many different formats - some examples:
      - Direct species names: "Berneuxia_thibetica_01" → matches "Berneuxia thibetica"
      - Abbreviated codes: "MENALB912C" → "MEN" (genus), "ALB" (species), "912" (possible voucher number/lab number/collector number/something else)
      NB - common abbreviated code for botany datasets is Collector surname + initial + collector number e.g. "GuppyA513" → "Guppy" (surname), "A" (initial), "513" (collector number)
      - Sample IDs: "SRR7451102" → matches a sample/accession ID in the data
      - Various other custom formats depending on the researcher
      
      STEPS:
      1. **Analyze the tree tip format**: Look at the tip labels and compare them to the data in your core table. What columns might they match to? (scientificName, catalogNumber, occurrenceID, a custom ID column, etc.)
      
      2. **Write Python code to do the matching**: Create code that:
         - Parses/decodes the tip labels as needed
         - Matches them to records in the core DataFrame
         - Adds a `dynamicProperties` column (or updates existing) with phylogeny info in this format:
           ```json
           {
             "phylogenies": [
               {
                 "phyloTreeTipLabel": "MENALB912C",
                 "phyloTreeFileName": "108_ASTRAL.tre"
               }
             ]
           }
           ```
      
      3. **Report matching statistics**:
         - How many records in the DataFrame have been matched to tree tips?
         - How many records have NOT been matched?
         - How many tree tips do NOT have a matching record?
      
      4. **Handle edge cases**:
         - If you cannot figure out how to programmatically match the tree tips, explain this to the user and ask for their help understanding the encoding scheme
         - If some tips can't be matched, let the user know which ones
      
      5. **Iterate with the user**: Continue the dialogue until the user is satisfied with the tree-to-record linkage. They may provide additional context about how the tip labels were constructed.
      
      IMPORTANT: The tree file itself will be included in the final Darwin Core Archive automatically - your job is just to set up the dynamicProperties linkage so that occurrence/taxon records can be associated with their corresponding tree tips.

- model: api.task
  fields:
    name: Final Review & Publication
    text: |-
      FINAL_TASK: This is the last step before attempting to publish the user's data to GBIF.

      Your subtasks:
      1.  **Summarize Work Done:** Based on the structural_notes, briefly explain to the user the key transformations and validations that have been performed on their data to get it to this stage. Highlight any major changes or assumptions made. 
      2.  **Check and Present Final Metadata:** Check and edit metadata as necessary (use SetBasicMetadata for title/description). If title and/or description are missing, DO NOT ask the user first. Generate best-effort values from tables, manuscript extraction, and conversation history, save them with SetBasicMetadata, then present the generated metadata to the user for optional edits.
          *   The user should not be required to write metadata from scratch.
          *   Ask for manual title/description only if the user explicitly wants to customize wording or if critical context is genuinely unavailable after best-effort inference.
          *   If confidence is low, provide your proposed draft and ask a single concise confirmation/edit question.
      3.  **Perform GBIF Validation:** 
          *   Run BasicValidationForSomeDwCTerms to confirm each table's columns align with a known DwC schema; fix any discrepancies.
          *   Call the UploadDwCA tool with arguments of the form `{"agent_id": <agent_id>, "core_table_id": <core_table_id>, "core_type": "<occurrence|event|taxon>", "extension_tables": {<table_id>: "<extension_key>", ...}}`. Omit `extension_tables` if there are no extensions.
          *   Check it for any issues by calling the ValidateDwCA tool
          *   Fix the issues, asking the user any questions if necessary
          *   Add to the structure_notes noting the issues and fixes
      3.  **Initiate Publication:** If the user approves:
          *   Call the PublishToGBIF tool to register the dataset with GBIF (this will go to the sandbox GBIF).
      5.  **Report Outcome:**
          *   If successful, present the GBIF sandbox dataset URL to the user.
          *   If PublishToGBIF returns an error, report this error clearly to the user.

      Ensure the user understands this is the final step before their data (potentially) becomes publicly accessible via GBIF's test system. It is not possible to publish to the production gbif.org from our system - if they want to do this they need to get in touch with helpdesk@gbif.no with their sandbox dataset URL. 

- model: api.task
  fields:
    name: Data maintenance
    text: |-
      MAINTENANCE_TASK: You are editing an already loaded dataset. Use the digest below to understand current tables and metadata. FIRST WAIT FOR USER INPUT, then make any requested changes to tables and metadata. Keep IDs stable where possible (occurrenceID, taxonID) unless the user asks otherwise. Re-run validation after changes. Update structure_notes with a concise changelog. It is not possible to publish to the production gbif.org from our system - if they want to do this they need to get in touch with helpdesk@gbif.no with their sandbox dataset URL. 
